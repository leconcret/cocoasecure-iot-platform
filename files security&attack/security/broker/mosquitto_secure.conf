# ─────────────────────────────────────────────────────────────
# mosquitto_secure.conf — CocoaSecure IoT Platform
# Configuration sécurisée : TLS 1.3 + authentification mutuelle (mTLS)
#
# À comparer avec broker/mosquitto.conf (version vulnérable utilisée
# pour les attaques A1/A2/A3) :
#   - allow_anonymous true   -> false (identité vérifiée par certificat client)
#   - port 1883 en clair     -> port 8883 avec TLS 1.3 obligatoire
#   - aucune auth            -> mTLS : le broker exige un certificat client
#                                signé par la CA locale (ca.crt)
# ─────────────────────────────────────────────────────────────

# ── Listener sécurisé (remplace le port 1883 en production) ──
listener 8883
protocol mqtt

# Authentification anonyme désactivée : seul un client présentant
# un certificat valide signé par notre CA peut se connecter.
allow_anonymous false

# Certificats du broker
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key

# Exige un certificat client valide (authentification mutuelle TLS)
require_certificate true

# Utilise le CN du certificat client comme identité MQTT
# (ex: CN=esp01 -> l'ESP01 est authentifié sans mot de passe séparé)
use_identity_as_username true

# Force TLS 1.3 uniquement (pas de repli sur 1.2/1.1/1.0)
tls_version tlsv1.3

# ── Listener WebSocket sécurisé (pour un futur dashboard temps réel) ──
listener 9002
protocol websockets
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
require_certificate false
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Logs pour preuve de connexions/rejets dans le rapport ──
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# ── Limites anti-DoS (complète la contre-mesure C5 de la matrice STRIDE) ──
max_connections 100
max_queued_messages 1000
message_size_limit 8192
