    .usecase { fill:#eef8f0; stroke:#1f6f43; stroke-width:2; }
    .arrow { stroke:#333; stroke-width:2; fill:none; marker-end:url(#arrow); }
    .line { stroke:#555; stroke-width:2; fill:none; }
    .dash { stroke:#444; stroke-width:2; fill:none; stroke-dasharray:7 6; marker-end:url(#arrow); }
    .txt { font: 15px Arial; fill:#111; }
    .small { font: 13px Arial; fill:#333; }
    .head { fill:#1f6f43; }
