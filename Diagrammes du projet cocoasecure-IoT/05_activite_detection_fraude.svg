<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
<style>
    .title { font: bold 30px Arial; fill:#123; }
    .sub { font: 18px Arial; fill:#333; }
    .box { fill:#ffffff; stroke:#1f6f43; stroke-width:2; rx:14; }
    .actor { fill:#f8fff9; stroke:#1f6f43; stroke-width:2; rx:12; }
    .usecase { fill:#eef8f0; stroke:#1f6f43; stroke-width:2; }
    .arrow { stroke:#333; stroke-width:2; fill:none; marker-end:url(#arrow); }
    .line { stroke:#555; stroke-width:2; fill:none; }
    .dash { stroke:#444; stroke-width:2; fill:none; stroke-dasharray:7 6; marker-end:url(#arrow); }
    .txt { font: 15px Arial; fill:#111; }
    .small { font: 13px Arial; fill:#333; }
    .head { fill:#1f6f43; }
    .headtxt { font: bold 16px Arial; fill:white; }
</style>
<defs>
